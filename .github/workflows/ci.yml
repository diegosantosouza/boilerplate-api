name: Node.js CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run suites of tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --forceExit
        env:
          DISABLE_AUTH: true
          CI: true

      - name: Source code quality checks
        run: npx biome check src/ tests/
        env:
          CI: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: coverage
          name: report-coverage

  integration-test:
    name: Run integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          DISABLE_AUTH: true
          CI: true

  build:
    name: Build a docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --progress=plain -t boilerplate-api/ci .
